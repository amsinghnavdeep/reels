name = "reels-api"
main = "src/index.js"
compatibility_date = "2024-11-01"

# Serve the dashboard UI (web/) straight from the Worker — no separate Pages project.
# Static files are served for matching paths; everything else hits the Worker fetch handler.
[assets]
directory = "../web"

# Daily scheduler (checks every 15 min; queues a job when the saved time matches).
[triggers]
crons = ["*/15 * * * *"]

# KV holds ALL state (text only): config + job + Instagram creds + runner heartbeat.
# No file storage — the driving video + voice live on the GPU box (or a pasted URL)
# and the finished reel is posted to Instagram / downloaded from the notebook.
# Create it once:  wrangler kv namespace create STATE   → paste the id below.
[[kv_namespaces]]
binding = "STATE"
id = "7ba7656e51434760888145d2409ea862"

# Secrets (do NOT put values here):
#   wrangler secret put DASH_KEY      # the dashboard password you type in the UI
#   wrangler secret put RUNNER_KEY    # a long random token the GPU runner uses
